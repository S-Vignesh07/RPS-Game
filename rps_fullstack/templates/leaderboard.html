{% extends "base.html" %}
{% block title %}Leaderboard - Rock Paper Scissors AI{% endblock %}

{% block content %}
<div class="leaderboard-page">
    <h1>🏆 Leaderboard</h1>
    <table class="leaderboard-table">
        <thead>
            <tr>
                <th>#</th>
                <th>Player</th>
                <th>Games</th>
                <th>Wins</th>
                <th>Losses</th>
                <th>Draws</th>
                <th>Win Rate</th>
            </tr>
        </thead>
        <tbody id="leaderboardBody">
            <tr><td colspan="7">Loading...</td></tr>
        </tbody>
    </table>
</div>
{% endblock %}

{% block scripts %}
<script>
async function loadLeaderboard() {
    const tbody = document.getElementById("leaderboardBody");
    try {
        const res = await fetch("/api/leaderboard");
        const data = await res.json();

        if (!data.length) {
            tbody.innerHTML = '<tr><td colspan="7">No games played yet. Go play a round!</td></tr>';
            return;
        }

        tbody.innerHTML = data.map((row, i) => `
            <tr>
                <td>${i + 1}</td>
                <td>${row.player_name}</td>
                <td>${row.total_games}</td>
                <td>${row.wins}</td>
                <td>${row.losses}</td>
                <td>${row.draws}</td>
                <td>${row.win_rate}%</td>
            </tr>
        `).join("");
    } catch (err) {
        tbody.innerHTML = '<tr><td colspan="7">Failed to load leaderboard.</td></tr>';
        console.error(err);
    }
}

loadLeaderboard();
</script>
{% endblock %}
