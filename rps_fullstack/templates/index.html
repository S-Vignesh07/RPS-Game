{% extends "base.html" %}
{% block title %}Play - Rock Paper Scissors AI{% endblock %}

{% block content %}
<div class="game-page">
    <div class="player-name-bar">
        <label for="playerName">Your name:</label>
        <input type="text" id="playerName" placeholder="Guest" value="Guest">
    </div>

    <div class="camera-wrapper">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="overlay"></canvas>
        <div id="countdownDisplay" class="countdown-display"></div>
        <div id="detectedGesture" class="detected-gesture">Show your hand...</div>
    </div>

    <div class="controls">
        <button id="playBtn" class="btn-primary">Play Round</button>
    </div>

    <div class="result-panel" id="resultPanel" style="display:none;">
        <div class="choices-row">
            <div class="choice-box">
                <span class="choice-label">You</span>
                <span id="playerChoiceText" class="choice-value">-</span>
            </div>
            <div class="vs">VS</div>
            <div class="choice-box">
                <span class="choice-label">Computer</span>
                <span id="computerChoiceText" class="choice-value">-</span>
            </div>
        </div>
        <div id="resultText" class="result-text">-</div>
    </div>

    <div class="scoreboard">
        <div class="score-item win">Wins: <span id="winCount">0</span></div>
        <div class="score-item lose">Losses: <span id="loseCount">0</span></div>
        <div class="score-item draw">Draws: <span id="drawCount">0</span></div>
    </div>

    <div id="statusMessage" class="status-message"></div>
</div>
{% endblock %}

{% block scripts %}
<!-- MediaPipe Hands (CDN) -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<script src="{{ url_for('static', filename='js/gesture.js') }}"></script>
<script src="{{ url_for('static', filename='js/game.js') }}"></script>
{% endblock %}
